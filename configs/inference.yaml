# ClearMesh Inference Configuration
#
# Usage:
#   python -m clearmesh.pipeline --input photo.png --config configs/inference.yaml

# === Stage 1 (TRELLIS.2) ===
resolution: 512                  # 512 (3s) | 1024 (17s) | 1536 (60s) on A100

# === Stage 2 (Refinement) ===
enable_refinement: true
stage2_checkpoint: /mnt/data/checkpoints/clearmesh_stage2/checkpoint_final.pt
refinement_steps: 50             # 50 = quality, 12 = fast

# === Part Decomposition (optional, kitbashing) ===
enable_decomposition: false
partcrafter_path: /mnt/data/PartCrafter

# === Geometry Super-Resolution (optional) ===
enable_super_resolution: false
supercarver_path: /mnt/data/SuperCarver
craftsmanship_path: /mnt/data/CraftsMan3D

# === Retopology (optional, clean topology for digital/game use) ===
enable_retopology: false
retopo_target_faces: 8000        # BPT max ~8K, TreeMeshGPT max ~11K

# === Mesh Processing ===
export_format: glb               # stl | glb | obj | fbx

# === PBR Textures (optional, digital variants) ===
enable_textures: false

# === Scaling (for 3D printing) ===
target_scale: null               # 28mm | 32mm | 54mm | 75mm | null
add_base: false                  # Add circular printing base
hollow: false                    # Hollow mesh for resin printing
wall_thickness_mm: 1.5           # Wall thickness when hollowed

# === Print Readiness ===
drain_holes: false               # Add drain holes when hollowing
orient_for_print: true           # Auto-orient for minimal supports

# === Auto-Rigging (optional) ===
enable_rigging: false
rigging_method: puppeteer        # puppeteer | unirig | humanrig

# === Background Removal ===
skip_background_removal: false   # Set true if input already has transparent bg
